<template>
    <lightning-card title="Lightning Record Edit Form Main">
        <lightning-record-edit-form record-id={recordId} object-api-name={objectApiName}>
            <lightning-messages></lightning-messages>
            <div class="slds-grid">
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name={name}></lightning-input-field>
                    <lightning-input-field field-name={phone}></lightning-input-field>
                    <lightning-input-field field-name={website}></lightning-input-field>
                </div>
                <div class="slds-col slds-size_1-of-2">
                    <lightning-input-field field-name={industry}></lightning-input-field>
                    <lightning-input-field field-name={annualRevenue}></lightning-input-field>
                    <lightning-input-field field-name={rating}></lightning-input-field>
                </div>
            </div>
            <div class="slds-m-top_medium">
                <lightning-button variant="brand" type="submit" name="update" label="Update Contact"></lightning-button>
            </div>
        </lightning-record-edit-form>
    </lightning-card>
</template>
