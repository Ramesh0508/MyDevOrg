<template>
    <div style="height:500px">
<!-- Infinite scrolling enables you to load a subset of data and then display more when users scroll to the end of the table -->
        <lightning-datatable key-field="Id"
                data={accounts}
                columns={columns}
                enable-infinite-loading
                onloadmore={loadMoreDataHandler}
                hide-checkbox-column="true"
                show-row-number-column="true">
        </lightning-datatable>
    </div>
</template>
