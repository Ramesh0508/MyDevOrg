<template>
    <lightning-card title="Accounts" icon-name="standard:account">
        <lightning-datatable
            key-field="Id"
            data={accounts}
            columns={accountColumns}>
        </lightning-datatable>
    </lightning-card>
    <lightning-card title="Contacts" icon-name="standard:contact">
        <lightning-datatable
            key-field="Id"
            data={contacts}
            columns={contactColumns}>
        </lightning-datatable>
    </lightning-card>
</template>
