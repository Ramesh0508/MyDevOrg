<template>
    <lightning-card title="Copy Billing Address to Mailing Address Scenario 3">
        <div class="slds-m-left_x-small slds-m-right_x_small">
            <lightning-input label="Billing Address" name="billingAddress" onchange={handleChangeValue} value={billingAdd}></lightning-input>
            <lightning-input label="Mailing Address" name="mailingAddress" value={mailingAdd}></lightning-input>
            <div class="slds-m-top_medium">
                <lightning-button variant="brand" label="Copy Billing Address to Mailing Address"
                    onclick={handleCopyAddress}></lightning-button>
            </div>
        </div>
    </lightning-card>

</template>
