<template>
    <lightning-card title="Call Apex Methods Imperatively" icon-name="custom:custom63">
        <div class="slds-m-around_medium">
            <p class="slds-m-bottom_small">
            <lightning-button label="Load Contacts" onclick={handleLoad}></lightning-button>
            </p>
            <template lwc:if={contacts}>
                <template for:each={contacts} for:item="contact">
                    <p key={contact.Id}>{contact.FirstName} {contact.LastName} - {contact.Email}</p>
                </template> 
                <p>{error}</p>
            </template>
        </div>
    </lightning-card>
</template>
